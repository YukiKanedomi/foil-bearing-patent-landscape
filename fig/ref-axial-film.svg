<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560" font-family="'Segoe UI','Yu Gothic UI',sans-serif">
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#333"/></marker>
  </defs>
  <rect width="820" height="560" fill="#ffffff"/>
  <text x="410" y="34" font-size="21" font-weight="700" text-anchor="middle" fill="#1a1a1a">軸方向断面：膜厚プロファイルと端部の最小膜厚</text>
  <text x="410" y="55" font-size="12" text-anchor="middle" fill="#777">＊参照用模式図。符号・寸法は仮・誇張。確定図面は弁理士レビュー前提。</text>

  <!-- axis arrow -->
  <line x1="120" y1="90" x2="700" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="708" y="94" font-size="13" fill="#333">軸方向 Z</text>

  <!-- bump foil + top foil (top, flat-ish) -->
  <line x1="140" y1="150" x2="680" y2="150" stroke="#e67e22" stroke-width="3"/>
  <text x="688" y="154" font-size="12" fill="#e67e22">バンプ/トップフォイル</text>
  <line x1="140" y1="175" x2="680" y2="175" stroke="#2980b9" stroke-width="2.5"/>

  <!-- shaft surface: barrel profile (bulging up at center) -->
  <path d="M 140,250 Q 410,205 680,250" fill="#aeb4bd" stroke="#555" stroke-width="2"/>
  <rect x="140" y="250" width="540" height="70" fill="#aeb4bd" stroke="#555" stroke-width="2"/>
  <text x="410" y="295" font-size="14" text-anchor="middle" fill="#333">軸(樽型プロファイル：遠心/熱膨張)</text>

  <!-- film thickness: between top foil(175) and shaft top(barrel) -->
  <!-- center gap small, end gap large -->
  <line x1="160" y1="175" x2="160" y2="247" stroke="#c0392b" stroke-width="1.4" marker-end="url(#a3)"/>
  <text x="150" y="220" font-size="11" text-anchor="end" fill="#c0392b">端部</text>
  <line x1="410" y1="175" x2="410" y2="207" stroke="#c0392b" stroke-width="1.4" marker-end="url(#a3)"/>
  <text x="420" y="198" font-size="11" fill="#c0392b">中央(薄)</text>
  <line x1="660" y1="175" x2="660" y2="247" stroke="#c0392b" stroke-width="1.4" marker-end="url(#a3)"/>

  <text x="410" y="350" font-size="13" text-anchor="middle" fill="#444">膜厚 h(z)：軸の樽/鼓・テーパで軸方向に非一様 → 中央が薄く、端部側方漏れで圧力降下</text>

  <!-- pressure profile plot -->
  <text x="140" y="410" font-size="13" font-weight="700" fill="#1a1a1a">膜内圧 p(z)（模式）</text>
  <line x1="160" y1="520" x2="680" y2="520" stroke="#333" stroke-width="1.2"/>
  <line x1="160" y1="520" x2="160" y2="420" stroke="#333" stroke-width="1.2"/>
  <text x="150" y="425" font-size="11" text-anchor="end" fill="#333">p</text>
  <text x="688" y="524" font-size="11" fill="#333">Z</text>
  <!-- pressure hump, drops to ambient at ends -->
  <path d="M 160,520 Q 290,440 410,440 Q 530,440 680,520" fill="none" stroke="#8e44ad" stroke-width="3"/>
  <line x1="160" y1="520" x2="680" y2="520" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="420" y="432" font-size="11" fill="#8e44ad">中央で最大</text>
  <text x="160" y="540" font-size="11" fill="#777">端=大気圧</text>
  <text x="640" y="540" font-size="11" fill="#777">端=大気圧</text>
</svg>
