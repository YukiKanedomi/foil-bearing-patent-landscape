<svg xmlns="http://www.w3.org/2000/svg" width="760" height="720" viewBox="0 0 760 720" font-family="'Segoe UI','Yu Gothic UI',sans-serif">
  <defs>
    <path id="b" d="M -15,-184 Q 0,-208 15,-184" fill="none" stroke="#e67e22" stroke-width="2.5"/>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#333"/></marker>
  </defs>
  <rect width="760" height="720" fill="#ffffff"/>
  <text x="380" y="36" font-size="22" font-weight="700" text-anchor="middle" fill="#1a1a1a">典型バンプフォイル型ラジアルガス軸受：横断面図</text>
  <text x="380" y="58" font-size="12" text-anchor="middle" fill="#777">＊参照用模式図。符号・寸法は仮・誇張。確定図面は弁理士レビュー前提。</text>

  <g transform="translate(360,360)">
    <!-- housing outer -->
    <circle cx="0" cy="0" r="240" fill="#c8ccd2" stroke="#555" stroke-width="2"/>
    <!-- inner wall (carve white) -->
    <circle cx="0" cy="0" r="205" fill="#ffffff" stroke="#555" stroke-width="2"/>
    <!-- bump foil base ring -->
    <circle cx="0" cy="0" r="184" fill="none" stroke="#e67e22" stroke-width="1.4"/>
    <!-- 30 bumps -->
    <use href="#b"/><use href="#b" transform="rotate(12)"/><use href="#b" transform="rotate(24)"/><use href="#b" transform="rotate(36)"/><use href="#b" transform="rotate(48)"/>
    <use href="#b" transform="rotate(60)"/><use href="#b" transform="rotate(72)"/><use href="#b" transform="rotate(84)"/><use href="#b" transform="rotate(96)"/><use href="#b" transform="rotate(108)"/>
    <use href="#b" transform="rotate(120)"/><use href="#b" transform="rotate(132)"/><use href="#b" transform="rotate(144)"/><use href="#b" transform="rotate(156)"/><use href="#b" transform="rotate(168)"/>
    <use href="#b" transform="rotate(180)"/><use href="#b" transform="rotate(192)"/><use href="#b" transform="rotate(204)"/><use href="#b" transform="rotate(216)"/><use href="#b" transform="rotate(228)"/>
    <use href="#b" transform="rotate(240)"/><use href="#b" transform="rotate(252)"/><use href="#b" transform="rotate(264)"/><use href="#b" transform="rotate(276)"/><use href="#b" transform="rotate(288)"/>
    <use href="#b" transform="rotate(300)"/><use href="#b" transform="rotate(312)"/><use href="#b" transform="rotate(324)"/><use href="#b" transform="rotate(336)"/><use href="#b" transform="rotate(348)"/>
    <!-- top foil -->
    <circle cx="0" cy="0" r="180" fill="#ffffff" stroke="#2980b9" stroke-width="3"/>
    <!-- shaft (eccentric downward) -->
    <circle cx="0" cy="14" r="170" fill="#aeb4bd" stroke="#555" stroke-width="2"/>
    <line x1="-12" y1="14" x2="12" y2="14" stroke="#333" stroke-width="1.2"/>
    <line x1="0" y1="2" x2="0" y2="26" stroke="#333" stroke-width="1.2"/>
    <text x="0" y="60" font-size="14" text-anchor="middle" fill="#333">軸</text>
    <!-- rotation arrow -->
    <path d="M -55,-70 A 90,90 0 0 1 70,-50" fill="none" stroke="#16a085" stroke-width="3" marker-end="url(#ar)"/>
    <text x="78" y="-58" font-size="13" fill="#16a085">回転</text>
    <!-- fixed end (left, 9 o'clock): clamp slot -->
    <rect x="-208" y="-10" width="30" height="20" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
  </g>

  <!-- callouts -->
  <text x="640" y="150" font-size="13" fill="#555">ハウジング/スリーブ</text>
  <line x1="638" y1="146" x2="560" y2="190" stroke="#555" stroke-width="1" marker-end="url(#ar)"/>
  <text x="650" y="300" font-size="13" fill="#e67e22">バンプフォイル</text>
  <line x1="648" y1="296" x2="548" y2="320" stroke="#e67e22" stroke-width="1" marker-end="url(#ar)"/>
  <text x="650" y="430" font-size="13" fill="#2980b9">トップフォイル</text>
  <line x1="648" y1="426" x2="540" y2="402" stroke="#2980b9" stroke-width="1" marker-end="url(#ar)"/>
  <text x="60" y="360" font-size="13" fill="#333" text-anchor="end" transform="translate(70,0)">固定端</text>
  <line x1="92" y1="356" x2="162" y2="360" stroke="#333" stroke-width="1" marker-end="url(#ar)"/>
  <text x="60" y="378" font-size="11" fill="#777" transform="translate(0,0)">(溶接/差込)</text>

  <!-- 空気膜 callout -->
  <text x="360" y="690" font-size="13" text-anchor="middle" fill="#c0392b">空気膜(すきま)：周方向に楔形成 → 浮上。偏心側に最小膜厚 h_min</text>
</svg>
